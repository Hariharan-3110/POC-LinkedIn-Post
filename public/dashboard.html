<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn POC - Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f3f2ef; padding: 24px; }
    header { background: #0a66c2; color: #fff; padding: 16px 24px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    header h1 { font-size: 20px; }
    header a { color: #fff; text-decoration: none; font-size: 14px; border: 1px solid #fff; padding: 6px 14px; border-radius: 4px; }
    .card { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto; }
    h2 { color: #333; margin-bottom: 16px; }
    textarea { width: 100%; height: 120px; border: 1px solid #ddd; border-radius: 6px; padding: 12px; font-size: 15px; resize: vertical; }
    .actions { display: flex; gap: 12px; margin-top: 12px; }
    button { padding: 10px 22px; border: none; border-radius: 24px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-post { background: #0a66c2; color: #fff; }
    .btn-post:hover { background: #004182; }
    .btn-delete { background: #cc1016; color: #fff; }
    .btn-delete:hover { background: #a00; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
    .result.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .result.error { background: #fdecea; color: #b71c1c; border: 1px solid #ef9a9a; }
    .post-id-section { margin-top: 20px; border-top: 1px solid #eee; padding-top: 16px; }
    .post-id-section label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
    .post-id-section input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    #userName { font-size: 14px; color: #e0e0e0; }
  </style>
</head>
<body>
  <header>
    <h1>LinkedIn POC Dashboard</h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="userName"></span>
      <a href="/logout">Logout</a>
    </div>
  </header>

  <div class="card">
    <h2>Create a Post</h2>
    <textarea id="postText" placeholder="What do you want to share on LinkedIn?"></textarea>
    <div class="actions">
      <button class="btn-post" id="postBtn" onclick="createPost()">Post to LinkedIn</button>
    </div>
    <div id="result" class="result"></div>

    <div class="post-id-section">
      <h2 style="margin-bottom:12px;">Delete a Post</h2>
      <label>Enter Post ID to delete (auto-filled after posting):</label>
      <input type="text" id="deletePostId" placeholder="urn:li:ugcPost:..." />
      <div class="actions" style="margin-top:10px;">
        <button class="btn-delete" id="deleteBtn" onclick="deletePost()">Delete Post</button>
      </div>
      <div id="deleteResult" class="result"></div>
    </div>
  </div>

  <script>
    // Load user info
    fetch('/api/me')
      .then(r => r.json())
      .then(data => {
        document.getElementById('userName').textContent = data.name || '';
      });

    async function createPost() {
      const text = document.getElementById('postText').value.trim();
      const resultEl = document.getElementById('result');
      const btn = document.getElementById('postBtn');

      if (!text) {
        showResult(resultEl, 'error', 'Please enter some text to post.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Posting...';

      try {
        const res = await fetch('/api/post', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();

        if (data.success) {
          showResult(resultEl, 'success', `Post created! Post ID: ${data.postId}`);
          document.getElementById('deletePostId').value = data.postId;
          document.getElementById('postText').value = '';
        } else {
          showResult(resultEl, 'error', `Error: ${JSON.stringify(data.error)}`);
        }
      } catch (e) {
        showResult(resultEl, 'error', 'Request failed: ' + e.message);
      }

      btn.disabled = false;
      btn.textContent = 'Post to LinkedIn';
    }

    async function deletePost() {
      const postId = document.getElementById('deletePostId').value.trim();
      const resultEl = document.getElementById('deleteResult');
      const btn = document.getElementById('deleteBtn');

      if (!postId) {
        showResult(resultEl, 'error', 'Please enter a Post ID to delete.');
        return;
      }

      if (!confirm(`Are you sure you want to delete post:\n${postId}`)) return;

      btn.disabled = true;
      btn.textContent = 'Deleting...';

      try {
        const res = await fetch(`/api/post/${encodeURIComponent(postId)}`, { method: 'DELETE' });
        const data = await res.json();

        if (data.success) {
          showResult(resultEl, 'success', 'Post deleted successfully!');
          document.getElementById('deletePostId').value = '';
        } else {
          showResult(resultEl, 'error', `Error: ${JSON.stringify(data.error)}`);
        }
      } catch (e) {
        showResult(resultEl, 'error', 'Request failed: ' + e.message);
      }

      btn.disabled = false;
      btn.textContent = 'Delete Post';
    }

    function showResult(el, type, msg) {
      el.className = `result ${type}`;
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
