<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn POC - Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f3f2ef; padding: 24px; }
    header { background: #0a66c2; color: #fff; padding: 16px 24px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    header h1 { font-size: 20px; }
    header a { color: #fff; text-decoration: none; font-size: 14px; border: 1px solid #fff; padding: 6px 14px; border-radius: 4px; }
    .card { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 680px; margin: 0 auto 20px; }
    h2 { color: #333; margin-bottom: 16px; font-size: 18px; }
    textarea { width: 100%; height: 110px; border: 1px solid #ddd; border-radius: 6px; padding: 12px; font-size: 15px; resize: vertical; }
    .post-as { display: flex; gap: 16px; margin: 12px 0; }
    .post-as label { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
    .post-as input[type="radio"] { accent-color: #0a66c2; }
    .actions { display: flex; gap: 12px; margin-top: 4px; }
    button { padding: 10px 22px; border: none; border-radius: 24px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-blue { background: #0a66c2; color: #fff; }
    .btn-blue:hover { background: #004182; }
    .btn-red { background: #cc1016; color: #fff; }
    .btn-red:hover { background: #a00; }
    .btn-green { background: #057642; color: #fff; }
    .btn-green:hover { background: #046034; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 14px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; word-break: break-all; }
    .result.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .result.error { background: #fdecea; color: #b71c1c; border: 1px solid #ef9a9a; }
    .result.info { background: #e3f2fd; color: #0d47a1; border: 1px solid #90caf9; }
    label.field-label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
    input[type="text"] { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 6px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; margin-top: 10px; }
    #userName { font-size: 14px; color: #e0e0e0; }
    .image-upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; margin: 12px 0; transition: border-color 0.2s; }
    .image-upload-area:hover { border-color: #0a66c2; }
    .image-upload-area.has-image { border-color: #057642; background: #f0fff4; }
    .image-upload-area input[type="file"] { display: none; }
    .image-preview { max-width: 100%; max-height: 200px; border-radius: 6px; margin-top: 10px; display: none; }
    .remove-image { background: none; border: none; color: #cc1016; font-size: 13px; cursor: pointer; margin-top: 6px; padding: 0; border-radius: 0; font-weight: normal; }
  </style>
</head>
<body>
  <header>
    <h1>LinkedIn POC Dashboard</h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="userName"></span>
      <a href="/logout">Logout</a>
    </div>
  </header>

  <!-- CREATE POST -->
  <div class="card">
    <h2>Create a Post</h2>
    <textarea id="postText" placeholder="What do you want to share on LinkedIn?"></textarea>
    <!-- Image Upload -->
    <div class="image-upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/gif" onchange="handleImageSelect(event)" />
      <div id="uploadPrompt">
        <div style="font-size:28px;">🖼️</div>
        <div style="color:#555;font-size:14px;margin-top:6px;">Click to add an image (JPG, PNG, GIF)</div>
        <div style="color:#aaa;font-size:12px;">Optional</div>
      </div>
      <img id="imagePreview" class="image-preview" alt="Preview" />
      <div id="imageName" style="font-size:13px;color:#057642;margin-top:6px;display:none;"></div>
      <button class="remove-image" id="removeImageBtn" onclick="removeImage(event)" style="display:none;">Remove image</button>
    </div>
    <div class="actions">
      <button class="btn-blue" id="postBtn" onclick="createPost()">Post to LinkedIn</button>
    </div>
    <div id="postResult" class="result"></div>
  </div>

  <!-- GET POST -->
  <div class="card">
    <h2>Get Post by ID</h2>
    <label class="field-label">Post ID (auto-filled after posting):</label>
    <input type="text" id="getPostId" placeholder="urn:li:share:..." />
    <div class="actions" style="margin-top:12px;">
      <button class="btn-green" id="getBtn" onclick="getPost()">Get Post</button>
    </div>
    <div id="getResult" class="result"></div>
  </div>

  <!-- DELETE POST -->
  <div class="card">
    <h2>Delete a Post</h2>
    <label class="field-label">Post ID (auto-filled after posting):</label>
    <input type="text" id="deletePostId" placeholder="urn:li:share:..." />
    <div class="actions" style="margin-top:12px;">
      <button class="btn-red" id="deleteBtn" onclick="deletePost()">Delete Post</button>
    </div>
    <div id="deleteResult" class="result"></div>
  </div>

  <script>
    fetch('/api/me').then(r => r.json()).then(data => {
      document.getElementById('userName').textContent = data.name || '';
    });

    function handleImageSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const preview = document.getElementById('imagePreview');
      const uploadArea = document.getElementById('uploadArea');
      const uploadPrompt = document.getElementById('uploadPrompt');
      const imageName = document.getElementById('imageName');
      const removeBtn = document.getElementById('removeImageBtn');

      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        uploadPrompt.style.display = 'none';
        imageName.textContent = file.name;
        imageName.style.display = 'block';
        removeBtn.style.display = 'inline-block';
        uploadArea.classList.add('has-image');
      };
      reader.readAsDataURL(file);
    }

    function removeImage(event) {
      event.stopPropagation();
      document.getElementById('imageInput').value = '';
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('imagePreview').src = '';
      document.getElementById('uploadPrompt').style.display = 'block';
      document.getElementById('imageName').style.display = 'none';
      document.getElementById('removeImageBtn').style.display = 'none';
      document.getElementById('uploadArea').classList.remove('has-image');
    }

    async function createPost() {
      const text = document.getElementById('postText').value.trim();
      const resultEl = document.getElementById('postResult');
      const btn = document.getElementById('postBtn');
      const imageFile = document.getElementById('imageInput').files[0];

      if (!text) return showResult(resultEl, 'error', 'Please enter some text to post.');

      btn.disabled = true;
      btn.textContent = imageFile ? 'Uploading image & posting...' : 'Posting...';

      try {
        const formData = new FormData();
        formData.append('text', text);
        if (imageFile) formData.append('image', imageFile);

        const res = await fetch('/api/post', {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();

        if (data.success) {
          const msg = data.hasImage
            ? `Post with image created! Post ID: ${data.postId}`
            : `Post created! Post ID: ${data.postId}`;
          showResult(resultEl, 'success', msg);
          document.getElementById('getPostId').value = data.postId;
          document.getElementById('deletePostId').value = data.postId;
          document.getElementById('postText').value = '';
          removeImage({ stopPropagation: () => {} });
        } else {
          showResult(resultEl, 'error', `Error: ${JSON.stringify(data.error)}`);
        }
      } catch (e) {
        showResult(resultEl, 'error', 'Request failed: ' + e.message);
      }

      btn.disabled = false;
      btn.textContent = 'Post to LinkedIn';
    }

    async function getPost() {
      const postId = document.getElementById('getPostId').value.trim();
      const resultEl = document.getElementById('getResult');
      const btn = document.getElementById('getBtn');

      if (!postId) return showResult(resultEl, 'error', 'Please enter a Post ID.');

      btn.disabled = true;
      btn.textContent = 'Fetching...';

      try {
        const res = await fetch(`/api/post/${encodeURIComponent(postId)}`);
        const data = await res.json();

        if (data.success) {
          showResult(resultEl, 'info', 'Post fetched successfully:');
          resultEl.innerHTML += `<pre>${JSON.stringify(data.post, null, 2)}</pre>`;
          resultEl.style.display = 'block';
        } else {
          showResult(resultEl, 'error', `Error: ${JSON.stringify(data.error)}`);
        }
      } catch (e) {
        showResult(resultEl, 'error', 'Request failed: ' + e.message);
      }

      btn.disabled = false;
      btn.textContent = 'Get Post';
    }

    async function deletePost() {
      const postId = document.getElementById('deletePostId').value.trim();
      const resultEl = document.getElementById('deleteResult');
      const btn = document.getElementById('deleteBtn');

      if (!postId) return showResult(resultEl, 'error', 'Please enter a Post ID.');
      if (!confirm(`Are you sure you want to delete:\n${postId}`)) return;

      btn.disabled = true;
      btn.textContent = 'Deleting...';

      try {
        const res = await fetch(`/api/post/${encodeURIComponent(postId)}`, { method: 'DELETE' });
        const data = await res.json();

        if (data.success) {
          showResult(resultEl, 'success', 'Post deleted successfully!');
          document.getElementById('deletePostId').value = '';
          document.getElementById('getPostId').value = '';
        } else {
          showResult(resultEl, 'error', `Error: ${JSON.stringify(data.error)}`);
        }
      } catch (e) {
        showResult(resultEl, 'error', 'Request failed: ' + e.message);
      }

      btn.disabled = false;
      btn.textContent = 'Delete Post';
    }

    function showResult(el, type, msg) {
      el.className = `result ${type}`;
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
