<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn POC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f3f2ef; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
    h1 { color: #0a66c2; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
    .btn { display: inline-block; background: #0a66c2; color: #fff; padding: 12px 28px; border-radius: 24px; text-decoration: none; font-size: 16px; font-weight: bold; }
    .btn:hover { background: #004182; }
    .error { color: red; margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>LinkedIn POC</h1>
    <p>Post and delete content on LinkedIn using the Share on LinkedIn API.</p>
    <a href="/auth/linkedin" class="btn">Login with LinkedIn</a>
    <div id="error" class="error"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      document.getElementById('error').textContent = 'Error: ' + params.get('error');
    }
  </script>
</body>
</html>
